# =============================================================================
# Volt Inverter PH1100 – Panel sterowania
# Urządzenie: voltultra
# =============================================================================

type: vertical-stack
cards:

  # ── Tryb pracy ───────────────────────────────────────────────────────────────
  - type: entities
    title: Tryb pracy
    show_header_toggle: false
    entities:
      - entity: select.voltultra_work_mode
      - entity: select.voltultra_advanced_mode_default_work_mode
        name: Tryb domyślny (gdy Advanced)

  # ── Ładowanie / Rozładowanie BMS ─────────────────────────────────────────────
  - type: entities
    title: Ładowanie / Rozładowanie
    show_header_toggle: false
    entities:
      - entity: number.voltultra_maximum_charge_current
      - entity: number.voltultra_maximum_discharge_current
      - entity: number.voltultra_maximum_grid_charge_current
      - entity: number.voltultra_constant_charge_voltage
      - entity: number.voltultra_float_charge_voltage
      - entity: number.voltultra_min_current_charge_voltage
      - entity: number.voltultra_min_current_charge_current
      - entity: number.voltultra_min_current_charge_soc

  # ── Ochrona baterii ───────────────────────────────────────────────────────────
  - type: entities
    title: Ochrona baterii
    show_header_toggle: false
    entities:
      - entity: number.voltultra_battery_low_voltage_fault
      - entity: number.voltultra_battery_low_voltage_recover
      - entity: number.voltultra_battery_low_voltage_alarm
      - entity: number.voltultra_battery_soc_low_alarm
      - entity: number.voltultra_battery_soc_low_fault
      - entity: number.voltultra_battery_soc_low_recover

  # ── Tryb użytkownika (User Mode) ──────────────────────────────────────────────
  - type: entities
    title: "Tryb użytkownika"
    show_header_toggle: false
    entities:
      - entity: number.voltultra_user_mode_battery_voltage_max
      - entity: number.voltultra_user_mode_battery_voltage_min
      - entity: number.voltultra_work_mode_soc_high
      - entity: number.voltultra_work_mode_soc_low

  # ── Wyrównywanie baterii ──────────────────────────────────────────────────────
  - type: entities
    title: Wyrównywanie baterii
    show_header_toggle: false
    entities:
      - entity: number.voltultra_eq_charge_voltage
      - entity: number.voltultra_battery_equalization_interval
      - entity: time.voltultra_battery_equalization_start_time
      - entity: time.voltultra_battery_equalization_end_time

  # ── Tryb zaawansowany ─────────────────────────────────────────────────────────
  - type: entities
    title: "Adv Mode – T1"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t1_start
        name: Start
      - entity: time.voltultra_adv_mode_t1_end
        name: End
      - entity: select.voltultra_adv_mode_t1_work_mode
        name: Work Mode

  - type: entities
    title: "Adv Mode – T2"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t2_start
        name: Start
      - entity: time.voltultra_adv_mode_t2_end
        name: End
      - entity: select.voltultra_adv_mode_t2_work_mode
        name: Work Mode

  - type: entities
    title: "Adv Mode – T3"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t3_start
        name: Start
      - entity: time.voltultra_adv_mode_t3_end
        name: End
      - entity: select.voltultra_adv_mode_t3_work_mode
        name: Work Mode

  - type: entities
    title: "Adv Mode – T4"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t4_start
        name: Start
      - entity: time.voltultra_adv_mode_t4_end
        name: End
      - entity: select.voltultra_adv_mode_t4_work_mode
        name: Work Mode

  - type: entities
    title: "Adv Mode – T5"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t5_start
        name: Start
      - entity: time.voltultra_adv_mode_t5_end
        name: End
      - entity: select.voltultra_adv_mode_t5_work_mode
        name: Work Mode

  - type: entities
    title: "Adv Mode – T6"
    show_header_toggle: false
    entities:
      - entity: time.voltultra_adv_mode_t6_start
        name: Start
      - entity: time.voltultra_adv_mode_t6_end
        name: End
      - entity: select.voltultra_adv_mode_t6_work_mode
        name: Work Mode

  # ── BMS / Inne ────────────────────────────────────────────────────────────────
  - type: entities
    title: BMS
    show_header_toggle: false
    entities:
      - entity: number.voltultra_bms_type
      - entity: switch.voltultra_antireflux_enable
